<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Roi-Kham — ตรวจสอบคำ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0f0e17;
  --surf:     #1a1825;
  --surf2:    #222133;
  --border:   #2e2c42;
  --gold:     #d4a84b;
  --gold-dim: #8a6b2a;
  --text:     #e8e4d9;
  --dim:      #7a7690;
  --green:    #4caf7d;
  --red:      #e05c5c;
  --yellow:   #f0c060;
}

body {
  font-family: 'Noto Sans Thai', 'Thonburi', 'Tahoma', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  font-size: 14px;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Header ── */
header {
  height: 50px;
  background: linear-gradient(135deg, #1a1825, #0f0e17);
  border-bottom: 1px solid var(--gold-dim);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  flex-shrink: 0;
}
header h1 {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  color: var(--gold);
  letter-spacing: 2px;
  flex-shrink: 0;
}

/* current mode button */
#modeSelectorBtn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-family: inherit;
  color: var(--text);
  font-size: 12px;
  flex-shrink: 0;
  transition: border-color 150ms;
}
#modeSelectorBtn:hover { border-color: var(--gold-dim); }
#modeSelectorBtn .arrow { color: var(--dim); font-size: 10px; }

/* score block */
.score-wrap {
  position: relative;
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
  margin-left: auto;
}
#scoreEl  { font-size: 13px; color: var(--gold); font-weight: 600; }
#streakEl { font-size: 11px; color: var(--yellow); min-width: 28px; }
.score-flash {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  font-weight: 700;
  color: var(--green);
  pointer-events: none;
  opacity: 0;
  white-space: nowrap;
}
.score-flash.pop { animation: popUp 600ms ease forwards; }
@keyframes popUp {
  0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-22px); }
}

#counter {
  font-size: 11px;
  color: var(--dim);
  flex-shrink: 0;
}
#exportBtn {
  font-size: 11px;
  color: var(--gold);
  background: transparent;
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  padding: 4px 9px;
  cursor: pointer;
  font-family: inherit;
  flex-shrink: 0;
}
#exportBtn:hover { background: var(--surf2); }

/* ── Layout ── */
.layout { display: flex; flex-direction: column; height: calc(100vh - 50px); }

/* ── Progress bar ── */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 14px;
  background: var(--surf2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.progress-bar {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
#progressFill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  width: 0%;
  transition: width 500ms ease;
}
#progressText { font-size: 10px; color: var(--dim); white-space: nowrap; }

/* ── Arena ── */
#arena {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Cards ── */
.card {
  position: absolute;
  width: min(320px, 88vw);
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 22px 24px;
  gap: 12px;
  overflow: hidden;
  will-change: transform;
}
.card-next {
  z-index: 1;
  transform: scale(0.95) translateY(14px);
  pointer-events: none;
  transition: transform 300ms ease;
}
.card-active { z-index: 2; cursor: grab; touch-action: none; }
.card-active:active { cursor: grabbing; }

/* ── Overlays ── */
.overlay {
  position: absolute; inset: 0; border-radius: 20px;
  opacity: 0; pointer-events: none;
}
.overlay-right { background: rgba(76,175,125,0.35); }
.overlay-left  { background: rgba(224,92,92,0.35); }
.overlay-up    { background: rgba(240,192,96,0.22); }

.overlay-label {
  position: absolute;
  font-size: 1.3rem;
  font-weight: 700;
  opacity: 0;
  pointer-events: none;
  border-radius: 8px;
  padding: 4px 14px;
  border: 2.5px solid;
}
.label-right { top: 22px; left: 18px; color: var(--green); border-color: var(--green); transform: rotate(-15deg); }
.label-left  { top: 22px; right: 18px; color: var(--red);   border-color: var(--red);   transform: rotate(15deg); }
.label-up    { bottom: 22px; left: 50%; transform: translateX(-50%); color: var(--yellow); border-color: var(--yellow); }

/* ── Card content ── */
.card-word-wrap {
  position: relative;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.card-word {
  font-size: 3rem; font-weight: 700; color: var(--text);
  letter-spacing: 2px; text-align: center; line-height: 1.25;
}
.syl-dots { display: flex; gap: 4px; }
.syl-dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--border); }
.syl-dot.filled { background: var(--gold-dim); }

.card-divider { width: 56px; height: 1px; background: var(--border); }
.card-field-label {
  font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--dim);
}
.card-classification {
  font-size: 1.4rem; font-weight: 600; color: var(--gold); text-align: center;
}
.card-sub { font-size: 11px; color: var(--dim); }

/* semantic tags (context clue on card) */
.cat-tags {
  display: flex; flex-wrap: wrap; gap: 5px;
  justify-content: center; margin-top: 2px;
}
.cat-tag {
  font-size: 10px; padding: 2px 9px; border-radius: 99px;
  background: var(--surf2); border: 1px solid var(--border); color: var(--dim);
}

/* category-mode prominent tags (what's being verified) */
.cat-tags-verify {
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: center;
}
.cat-tag-verify {
  font-size: 13px; padding: 5px 13px; border-radius: 99px;
  background: rgba(212,168,75,0.10);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  font-weight: 600;
}
.cat-tag-empty {
  font-size: 1.1rem; color: var(--dim); font-style: italic;
}

/* ── Exit animations ── */
.exit-right {
  transform: translateX(130vw) rotate(30deg) !important;
  opacity: 0 !important;
  transition: transform 320ms ease-in, opacity 320ms ease-in !important;
}
.exit-left {
  transform: translateX(-130vw) rotate(-30deg) !important;
  opacity: 0 !important;
  transition: transform 320ms ease-in, opacity 320ms ease-in !important;
}
.exit-up {
  transform: translateY(-130vh) !important;
  opacity: 0 !important;
  transition: transform 320ms ease-in, opacity 320ms ease-in !important;
}
.snap-back {
  transition: transform 220ms cubic-bezier(0.34, 1.56, 0.64, 1) !important;
}

/* ── Empty state ── */
#emptyState {
  display: none; flex-direction: column; align-items: center;
  gap: 14px; color: var(--dim); text-align: center; padding: 24px;
}
#emptyState.visible { display: flex; }
#emptyState .empty-icon { font-size: 3rem; }
#emptyState h2 { color: var(--gold); font-size: 1.1rem; font-weight: 600; }
#emptyState p  { font-size: 13px; line-height: 1.6; }

/* ── Hint row ── */
.hint-row {
  display: flex; justify-content: center; gap: 36px;
  padding: 9px 0 13px; flex-shrink: 0;
  border-top: 1px solid var(--border); background: var(--surf);
}
.hint { font-size: 11px; }
.hint-wrong { color: var(--red); }
.hint-right { color: var(--green); }
.hint-skip  { color: var(--yellow); }

/* ── Shared sheet styles ── */
#backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 10; opacity: 0; pointer-events: none; transition: opacity 280ms;
}
#backdrop.visible { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surf);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 12px 20px 32px;
  transform: translateY(100%);
  transition: transform 280ms cubic-bezier(0.4, 0, 0.2, 1);
  max-height: 85vh;
  overflow-y: auto;
}
.sheet.visible { transform: translateY(0); }
.sheet-handle {
  width: 40px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 0 auto 18px;
}
.sheet-title {
  font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--dim); text-align: center; margin-bottom: 14px;
}
.sheet-wrong-word {
  font-size: 1.7rem; font-weight: 700; color: var(--text);
  text-align: center; margin-bottom: 4px;
}
.sheet-wrong-current {
  font-size: 12px; color: var(--red); text-align: center; margin-bottom: 18px;
}
.sheet-cancel {
  width: 100%; padding: 10px; font-size: 13px; font-family: inherit;
  background: transparent; border: 1px solid var(--border);
  border-radius: 10px; color: var(--dim); cursor: pointer;
}
.sheet-cancel:hover { background: var(--surf2); }

/* correction option grid */
.option-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 8px; margin-bottom: 12px;
}
.option-btn {
  padding: 13px 8px; font-size: 14px; font-family: inherit;
  background: var(--surf2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); cursor: pointer;
  text-align: center; transition: background 120ms, border-color 120ms;
  line-height: 1.3;
}
.option-btn:hover { background: var(--border); border-color: var(--gold-dim); }
.option-btn.current-val { border-color: var(--red); color: var(--dim); }

/* cat multi-select chips */
.cat-chip-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 8px; margin-bottom: 14px;
}
.cat-chip {
  padding: 10px 8px; font-size: 13px; font-family: inherit;
  background: var(--surf2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--dim); cursor: pointer;
  text-align: center; transition: background 120ms, border-color 120ms, color 120ms;
}
.cat-chip.selected {
  background: rgba(212,168,75,0.12);
  border-color: var(--gold);
  color: var(--gold);
}
.confirm-btn {
  width: 100%; padding: 12px; font-size: 14px; font-family: inherit;
  background: var(--gold-dim); border: none;
  border-radius: 10px; color: var(--text);
  cursor: pointer; margin-bottom: 8px; font-weight: 600;
  transition: background 120ms;
}
.confirm-btn:hover { background: var(--gold); color: #0f0e17; }

/* ── Mode picker sheet ── */
#modePicker { z-index: 13; }
.mode-card {
  display: flex; align-items: center; gap: 14px; width: 100%;
  padding: 14px 16px; margin-bottom: 8px;
  background: var(--surf2); border: 1px solid var(--border);
  border-radius: 14px; cursor: pointer; font-family: inherit;
  text-align: left; transition: border-color 150ms, background 150ms;
}
.mode-card:hover { border-color: var(--gold-dim); background: var(--border); }
.mode-card.current { border-color: var(--gold); }
.mode-card-icon { font-size: 1.6rem; flex-shrink: 0; }
.mode-card-info { flex: 1; }
.mode-card-name { font-size: 15px; font-weight: 600; color: var(--text); }
.mode-card-sub  { font-size: 11px; color: var(--dim); margin-top: 2px; }
.mode-card-progress {
  font-size: 11px; color: var(--gold-dim); text-align: right;
  flex-shrink: 0; white-space: nowrap;
}
</style>
</head>
<body>

<header>
  <h1>ROI-KHAM</h1>
  <button id="modeSelectorBtn" onclick="openModePicker()">
    <span id="modeLabel">ชนิดคำ (POS)</span>
    <span class="arrow">▾</span>
  </button>
  <div class="score-wrap">
    <span id="scoreEl">⭐ 0</span>
    <span id="streakEl"></span>
    <span class="score-flash" id="scoreFlash"></span>
  </div>
  <span id="counter">0 คำ</span>
  <button id="exportBtn">Export</button>
</header>

<div class="layout">
  <div class="progress-wrap">
    <div class="progress-bar"><div id="progressFill"></div></div>
    <span id="progressText">0 / 0</span>
  </div>

  <div id="arena">
    <div id="emptyState">
      <div class="empty-icon">🎉</div>
      <h2>ตรวจสอบครบแล้ว!</h2>
      <p>คุณตรวจสอบคำทั้งหมดในโหมดนี้แล้ว</p>
      <p>อย่าลืมกด Export เพื่อบันทึกผล</p>
    </div>
  </div>

  <div class="hint-row">
    <span class="hint hint-wrong">← ผิด</span>
    <span class="hint hint-skip">↑ ข้าม</span>
    <span class="hint hint-right">→ ถูก</span>
  </div>
</div>

<!-- Backdrop (shared) -->
<div id="backdrop" onclick="handleBackdropClick()"></div>

<!-- Mode picker sheet -->
<div class="sheet" id="modePicker">
  <div class="sheet-handle"></div>
  <div class="sheet-title">เลือกโหมดการตรวจสอบ</div>
  <div id="modeCards"></div>
</div>

<!-- Single-select correction sheet -->
<div class="sheet" id="correctionSheet" style="z-index:12">
  <div class="sheet-handle"></div>
  <div class="sheet-wrong-word"    id="sheetWord"></div>
  <div class="sheet-wrong-current" id="sheetCurrent"></div>
  <div class="sheet-title">เลือกการจัดหมวดหมู่ที่ถูกต้อง</div>
  <div class="option-grid" id="optionGrid"></div>
  <button class="sheet-cancel" onclick="dismissSheet()">ยกเลิก — ข้ามคำนี้</button>
</div>

<!-- Multi-select category correction sheet -->
<div class="sheet" id="catSelectSheet" style="z-index:12">
  <div class="sheet-handle"></div>
  <div class="sheet-wrong-word" id="catSheetWord"></div>
  <div class="sheet-title" style="margin-top:8px">เลือกหมวดหมู่ที่ถูกต้อง (เลือกได้หลายหมวด)</div>
  <div class="cat-chip-grid" id="catChipGrid"></div>
  <button class="confirm-btn" onclick="confirmCatSelection()">ยืนยันการแก้ไข</button>
  <button class="sheet-cancel" onclick="dismissSheet()">ยกเลิก — ข้ามคำนี้</button>
</div>

<script src="words.js"></script>
<script>
'use strict';

/* ── Data Maps ─────────────────────────────────────────────────────── */
const IDX = { syl:0, pos:1, live:2, final:3, lead:4, sara:5, ban:6, cats:7 };

const POS_MAP = [
  { th:'คำนาม',          db:'NOUN' },
  { th:'คำกริยา',        db:'VERB' },
  { th:'คำวิเศษณ์',      db:'ADJ'  },
  { th:'คำกริยาวิเศษณ์', db:'ADV'  },
  { th:'คำสรรพนาม',      db:'PRON' },
  { th:'คำสันธาน',       db:'CONJ' },
  { th:'คำอุทาน',        db:'INTJ' },
  { th:'คำบุพบท',        db:'PREP' },
  { th:'คำลักษณนาม',     db:'CLAS' },
  { th:'คำนิบาต',        db:'PART' },
  { th:'คำปฏิเสธ',       db:'NEG'  },
  { th:'อื่นๆ',          db:''     },
];

const FINAL_MAP = [
  { th:'แม่กก',                   db:'กก'   },
  { th:'แม่กด',                   db:'กด'   },
  { th:'แม่กบ',                   db:'กบ'   },
  { th:'แม่กง',                   db:'กง'   },
  { th:'แม่กน',                   db:'กน'   },
  { th:'แม่กม',                   db:'กม'   },
  { th:'แม่เกย',                  db:'เกย'  },
  { th:'แม่เกอว',                 db:'เกอว' },
  { th:'แม่ก กา (ไม่มีตัวสะกด)', db:'none' },
];

const LIVEDEAD_MAP = [
  { th:'เสียงสูง / Live',    db:'live' },
  { th:'เสียงต่ำ / Dead',    db:'dead' },
];

const LEAD_MAP = [
  { th:'อักษรกลาง', db:'mid'  },
  { th:'อักษรต่ำ',  db:'low'  },
  { th:'อักษรสูง',  db:'high' },
];

const CAT_MAP = {
  animal:'สัตว์', plant:'พืช', food:'อาหาร', drink:'เครื่องดื่ม',
  fruit:'ผลไม้', vegetable:'ผัก', vehicle:'ยานพาหนะ', house_item:'ของใช้ในบ้าน',
  body_part:'อวัยวะ', family:'ครอบครัว', color:'สี', shape:'รูปทรง',
  nature:'ธรรมชาติ', weather:'สภาพอากาศ', sport:'กีฬา', hobby:'งานอดิเรก',
};
const CAT_ARRAY = Object.entries(CAT_MAP).map(([db, th]) => ({ db, th }));

/* ── Mode Definitions ───────────────────────────────────────────────── */
const MODES = [
  { id:'pos',      th:'ชนิดคำ',       sub:'POS · 12 ประเภท',   icon:'📝', field:'pos',            idx:IDX.pos,   multi:false, map:POS_MAP       },
  { id:'final',    th:'มาตราตัวสะกด', sub:'8 มาตรา + กา',      icon:'🔤', field:'final_class',    idx:IDX.final, multi:false, map:FINAL_MAP     },
  { id:'livedead', th:'เสียงคำ',      sub:'Live / Dead',        icon:'🔊', field:'live_dead',      idx:IDX.live,  multi:false, map:LIVEDEAD_MAP  },
  { id:'lead',     th:'อักษร 3 หมู่', sub:'กลาง / ต่ำ / สูง',  icon:'🎯', field:'leading_class',  idx:IDX.lead,  multi:false, map:LEAD_MAP      },
  { id:'cats',     th:'หมวดหมู่คำ',   sub:'Semantic · 16 หมวด', icon:'🏷️', field:'categories',    idx:IDX.cats,  multi:true,  map:CAT_ARRAY     },
];

/* ── State ──────────────────────────────────────────────────────────── */
const LS_KEY = 'roi_verify';
const SWIPE_THRESHOLD = 75;
const ROT_MAX = 15;

let modeId        = 'pos';
let queue         = [];
let currentWord   = null;
let verifications = [];
let activeCard    = null;
let openSheet     = null;   // 'correction' | 'catSelect' | 'mode'
let pendingWord   = null;
let catSelection  = new Set();

let sessionScore = 0;
let streak       = 0;

// per-mode verified word sets
const verifiedSets = {};
for (const m of MODES) verifiedSets[m.id] = new Set();

// drag
let dragging = false;
let startX = 0, startY = 0, dx = 0, dy = 0;

/* ── Helpers ────────────────────────────────────────────────────────── */
function modeObj()    { return MODES.find(m => m.id === modeId); }
function currentSet() { return verifiedSets[modeId]; }

function getDbVal(word) {
  const entry = window.WORD_DB[word];
  if (!entry) return '';
  return entry[modeObj().idx] ?? '';
}

function getLabel(dbVal) {
  const m = modeObj();
  if (m.multi) {
    if (!dbVal) return '(ไม่มีหมวดหมู่)';
    return dbVal.split(',').filter(Boolean).map(c => CAT_MAP[c] || c).join(', ');
  }
  return (m.map.find(x => x.db === dbVal) || { th: dbVal || '—' }).th;
}

function el(tag, cls, text) {
  const d = document.createElement(tag);
  d.className = cls;
  if (text !== undefined) d.textContent = text;
  return d;
}

/* ── Init ───────────────────────────────────────────────────────────── */
function init() {
  if (!window.WORD_DB) {
    document.getElementById('arena').innerHTML =
      '<p style="color:var(--red);padding:20px;text-align:center">ไม่พบ words.js — ต้องเปิดจากโฟลเดอร์ prototype/</p>';
    return;
  }
  const saved = localStorage.getItem(LS_KEY);
  if (saved) { try { verifications = JSON.parse(saved); } catch(_) { verifications = []; } }
  buildVerifiedSets();
  buildQueue();
  renderCards();
  updateHeader();
  updateProgress();
  buildModeCards();
  document.getElementById('exportBtn').addEventListener('click', exportJSON);
}

function buildVerifiedSets() {
  for (const m of MODES) verifiedSets[m.id].clear();
  for (const r of verifications) {
    const m = MODES.find(x => x.field === r.field);
    if (m) verifiedSets[m.id].add(r.word);
  }
}

function buildQueue() {
  const all  = Object.keys(window.WORD_DB);
  const done = currentSet();
  const unverified = [], verified = [];
  for (const w of all) { (done.has(w) ? verified : unverified).push(w); }
  shuffle(unverified); shuffle(verified);
  queue = [...unverified, ...verified];
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

/* ── Mode Picker ────────────────────────────────────────────────────── */
function buildModeCards() {
  const container = document.getElementById('modeCards');
  container.innerHTML = '';
  const total = Object.keys(window.WORD_DB).length;
  for (const m of MODES) {
    const done  = verifiedSets[m.id].size;
    const pct   = total > 0 ? (done / total * 100).toFixed(1) : '0.0';
    const btn   = document.createElement('button');
    btn.className = 'mode-card' + (m.id === modeId ? ' current' : '');
    btn.innerHTML = `
      <span class="mode-card-icon">${m.icon}</span>
      <span class="mode-card-info">
        <span class="mode-card-name">${m.th}</span>
        <span class="mode-card-sub">${m.sub}</span>
      </span>
      <span class="mode-card-progress">${done.toLocaleString()}<br>(${pct}%)</span>`;
    btn.onclick = () => selectMode(m.id);
    container.appendChild(btn);
  }
}

function openModePicker() {
  buildModeCards();
  document.getElementById('backdrop').classList.add('visible');
  document.getElementById('modePicker').classList.add('visible');
  openSheet = 'mode';
}

function closeModePicker() {
  document.getElementById('backdrop').classList.remove('visible');
  document.getElementById('modePicker').classList.remove('visible');
  openSheet = null;
}

function selectMode(id) {
  closeModePicker();
  if (id === modeId) return;
  modeId = id;
  buildQueue();
  renderCards();
  updateHeader();
  updateProgress();
}

/* ── Card Rendering ─────────────────────────────────────────────────── */
function renderCards() {
  const arena = document.getElementById('arena');
  arena.querySelectorAll('.card').forEach(c => c.remove());

  if (queue.length === 0) {
    document.getElementById('emptyState').classList.add('visible');
    activeCard = null; currentWord = null;
    return;
  }
  document.getElementById('emptyState').classList.remove('visible');
  currentWord = queue[0];

  if (queue.length > 1) arena.appendChild(createCard(queue[1], true));
  const card = createCard(queue[0], false);
  arena.appendChild(card);
  activeCard = card;
  attachDrag(card);
}

function createCard(word, isNext) {
  const m      = modeObj();
  const entry  = window.WORD_DB[word];
  const dbVal  = entry ? (entry[m.idx] ?? '') : '';
  const sylCnt = entry ? entry[IDX.syl] : 1;
  const cats   = entry && entry[IDX.cats] ? entry[IDX.cats].split(',').filter(Boolean) : [];

  const card = document.createElement('div');
  card.className = 'card ' + (isNext ? 'card-next' : 'card-active');

  if (!isNext) {
    [['overlay-right','ov-r'],['overlay-left','ov-l'],['overlay-up','ov-u']].forEach(([cls, id]) => {
      const d = document.createElement('div');
      d.className = 'overlay ' + cls; d.id = id;
      card.appendChild(d);
    });
    [['label-right','✓ ถูก'],['label-left','✗ ผิด'],['label-up','↑ ข้าม']].forEach(([cls, txt]) => {
      const d = document.createElement('div');
      d.className = 'overlay-label ' + cls; d.textContent = txt;
      card.appendChild(d);
    });
  }

  // word + syllable dots
  const wrap = el('div', 'card-word-wrap');
  wrap.appendChild(el('div', 'card-word', word));
  if (sylCnt > 1) {
    const dots = el('div', 'syl-dots');
    for (let i = 0; i < Math.min(sylCnt, 6); i++) dots.appendChild(el('span', 'syl-dot filled'));
    wrap.appendChild(dots);
  }
  card.appendChild(wrap);
  card.appendChild(el('div', 'card-divider'));

  if (m.id === 'cats') {
    // categories mode: show verified categories prominently
    card.appendChild(el('div', 'card-field-label', m.th));
    if (cats.length) {
      const tagsEl = el('div', 'cat-tags-verify');
      cats.forEach(c => tagsEl.appendChild(el('span', 'cat-tag-verify', CAT_MAP[c] || c)));
      card.appendChild(tagsEl);
    } else {
      card.appendChild(el('div', 'cat-tag-empty', '(ไม่มีหมวดหมู่)'));
    }
  } else {
    // standard mode: show classification
    card.appendChild(el('div', 'card-field-label', m.th));
    card.appendChild(el('div', 'card-classification', getLabel(dbVal) || '—'));
    if (dbVal && dbVal !== getLabel(dbVal)) card.appendChild(el('div', 'card-sub', dbVal));

    // semantic tags as context clue (for non-cats modes)
    if (cats.length) {
      const tagsEl = el('div', 'cat-tags');
      cats.slice(0, 5).forEach(c => tagsEl.appendChild(el('span', 'cat-tag', CAT_MAP[c] || c)));
      card.appendChild(tagsEl);
    }
  }

  return card;
}

/* ── Drag Engine ────────────────────────────────────────────────────── */
function attachDrag(card) { card.addEventListener('pointerdown', onDown); }

function onDown(e) {
  if (openSheet || !activeCard) return;
  dragging = true;
  startX = e.clientX; startY = e.clientY; dx = 0; dy = 0;
  activeCard.setPointerCapture(e.pointerId);
  activeCard.addEventListener('pointermove', onMove);
  activeCard.addEventListener('pointerup',   onUp);
  activeCard.addEventListener('pointercancel', onCancel);
}

function onMove(e) {
  if (!dragging) return;
  dx = e.clientX - startX; dy = e.clientY - startY;
  const rot = (dx / window.innerWidth) * ROT_MAX * 2;
  activeCard.style.transform = `translate(${dx}px,${dy}px) rotate(${rot}deg)`;

  const rP = Math.min(1, Math.max(0,  dx) / SWIPE_THRESHOLD);
  const lP = Math.min(1, Math.max(0, -dx) / SWIPE_THRESHOLD);
  const uP = Math.min(1, Math.max(0, -dy) / SWIPE_THRESHOLD);

  const ovR = document.getElementById('ov-r');
  const ovL = document.getElementById('ov-l');
  const ovU = document.getElementById('ov-u');
  if (ovR) ovR.style.opacity = rP;
  if (ovL) ovL.style.opacity = lP;
  if (ovU) ovU.style.opacity = uP * 0.85;

  activeCard.querySelectorAll('.overlay-label').forEach(d => {
    if      (d.classList.contains('label-right')) d.style.opacity = Math.min(1, rP * 1.6);
    else if (d.classList.contains('label-left'))  d.style.opacity = Math.min(1, lP * 1.6);
    else if (d.classList.contains('label-up'))    d.style.opacity = Math.min(1, uP * 1.6);
  });
}

function onUp(e) {
  if (!dragging) return;
  dragging = false; cleanupDrag();
  const ax = Math.abs(dx), ay = Math.abs(dy);
  if      (ax > SWIPE_THRESHOLD && ax >= ay) doSwipe(dx > 0 ? 'right' : 'left');
  else if (-dy > SWIPE_THRESHOLD && ay > ax) doSwipe('up');
  else snapBack();
}

function onCancel() { dragging = false; cleanupDrag(); snapBack(); }

function cleanupDrag() {
  if (!activeCard) return;
  activeCard.removeEventListener('pointermove', onMove);
  activeCard.removeEventListener('pointerup',   onUp);
  activeCard.removeEventListener('pointercancel', onCancel);
}

function snapBack() {
  if (!activeCard) return;
  activeCard.classList.add('snap-back');
  activeCard.style.transform = '';
  activeCard.querySelectorAll('.overlay, .overlay-label').forEach(d => d.style.opacity = '0');
  activeCard.addEventListener('transitionend',
    () => activeCard && activeCard.classList.remove('snap-back'), { once: true });
}

/* ── Swipe Actions ──────────────────────────────────────────────────── */
function doSwipe(dir) {
  if (!activeCard || !currentWord) return;
  if (dir === 'right') {
    saveVerification(currentWord, 'correct', null);
    flyOut('right');
    setTimeout(advance, 320);
  } else if (dir === 'up') {
    resetStreak();
    flyOut('up');
    const w = queue.shift(); queue.push(w);
    setTimeout(renderCards, 320);
  } else {
    snapBack();
    pendingWord = currentWord;
    if (modeObj().multi) showCatSelectSheet();
    else showCorrectionSheet();
  }
}

function flyOut(dir) {
  if (!activeCard) return;
  const next = document.getElementById('arena').querySelector('.card-next');
  if (next) next.style.transform = 'scale(1) translateY(0)';
  activeCard.classList.add('exit-' + dir);
}

function advance() {
  queue.shift();
  renderCards();
  updateHeader();
  updateProgress();
}

/* ── Single-select Correction Sheet ────────────────────────────────── */
function showCorrectionSheet() {
  const word   = pendingWord;
  const dbVal  = getDbVal(word);
  const m      = modeObj();

  document.getElementById('sheetWord').textContent    = word;
  document.getElementById('sheetCurrent').textContent = `ค่าปัจจุบัน: ${getLabel(dbVal)}  (${dbVal || 'ว่าง'})`;

  const grid = document.getElementById('optionGrid');
  grid.innerHTML = '';
  for (const opt of m.map) {
    const btn = document.createElement('button');
    btn.className  = 'option-btn' + (opt.db === dbVal ? ' current-val' : '');
    btn.textContent = opt.th;
    btn.onclick    = () => selectCorrection(opt.db);
    grid.appendChild(btn);
  }

  document.getElementById('backdrop').classList.add('visible');
  document.getElementById('correctionSheet').classList.add('visible');
  openSheet = 'correction';
}

function selectCorrection(dbValue) {
  const word = pendingWord;
  hideAllSheets();
  saveVerification(word, 'wrong', dbValue);
  flyOut('left');
  setTimeout(advance, 320);
}

/* ── Multi-select Category Sheet ────────────────────────────────────── */
function showCatSelectSheet() {
  const word  = pendingWord;
  const entry = window.WORD_DB[word];
  const curr  = entry ? (entry[IDX.cats] || '') : '';
  catSelection = new Set(curr.split(',').filter(Boolean));

  document.getElementById('catSheetWord').textContent = word;

  const grid = document.getElementById('catChipGrid');
  grid.innerHTML = '';
  for (const opt of CAT_ARRAY) {
    const btn = document.createElement('button');
    btn.className  = 'cat-chip' + (catSelection.has(opt.db) ? ' selected' : '');
    btn.textContent = opt.th;
    btn.dataset.db  = opt.db;
    btn.onclick = () => {
      catSelection.has(opt.db) ? catSelection.delete(opt.db) : catSelection.add(opt.db);
      btn.classList.toggle('selected', catSelection.has(opt.db));
    };
    grid.appendChild(btn);
  }

  document.getElementById('backdrop').classList.add('visible');
  document.getElementById('catSelectSheet').classList.add('visible');
  openSheet = 'catSelect';
}

function confirmCatSelection() {
  const word       = pendingWord;
  const correction = [...catSelection].sort().join(',');
  hideAllSheets();
  saveVerification(word, 'wrong', correction);
  flyOut('left');
  setTimeout(advance, 320);
}

/* ── Sheet Management ───────────────────────────────────────────────── */
function hideAllSheets() {
  document.getElementById('backdrop').classList.remove('visible');
  document.getElementById('correctionSheet').classList.remove('visible');
  document.getElementById('catSelectSheet').classList.remove('visible');
  document.getElementById('modePicker').classList.remove('visible');
  openSheet = null;
  pendingWord = null;
}

function dismissSheet() {
  hideAllSheets();
  snapBack();
}

function handleBackdropClick() {
  if (openSheet === 'mode') closeModePicker();
  else dismissSheet();
}

/* ── Score ──────────────────────────────────────────────────────────── */
function addScore(type) {
  const base        = type === 'correction' ? 20 : 10;
  const streakBonus = Math.floor(streak / 5) * 2;
  const earned      = base + streakBonus;
  sessionScore     += earned; streak++;

  document.getElementById('scoreEl').textContent  = `⭐ ${sessionScore.toLocaleString()}`;
  document.getElementById('streakEl').textContent = streak >= 3 ? `🔥${streak}` : '';

  const flash = document.getElementById('scoreFlash');
  flash.textContent = `+${earned}`;
  flash.classList.remove('pop');
  void flash.offsetWidth;
  flash.classList.add('pop');
}

function resetStreak() {
  streak = 0;
  document.getElementById('streakEl').textContent = '';
}

/* ── Progress & Header ──────────────────────────────────────────────── */
function updateHeader() {
  const m = modeObj();
  document.getElementById('modeLabel').textContent = `${m.icon} ${m.th}`;
  document.getElementById('counter').textContent   = `${currentSet().size.toLocaleString()} คำ`;
}

function updateProgress() {
  const total = Object.keys(window.WORD_DB).length;
  const done  = currentSet().size;
  const pct   = total > 0 ? (done / total * 100).toFixed(2) : '0.00';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent =
    `${done.toLocaleString()} / ${total.toLocaleString()}  (${pct}%)`;
}

/* ── Persistence ────────────────────────────────────────────────────── */
function saveVerification(word, vote, correction) {
  const m       = modeObj();
  const entry   = window.WORD_DB[word];
  const current = entry ? (entry[m.idx] ?? '') : '';

  verifications.push({ word, field: m.field, vote, current, correction, ts: Math.floor(Date.now() / 1000) });
  try { localStorage.setItem(LS_KEY, JSON.stringify(verifications)); }
  catch(_) { alert('localStorage เต็ม! กรุณากด Export แล้วรีโหลดหน้า'); }

  currentSet().add(word);
  addScore(vote === 'wrong' ? 'correction' : 'confirm');
}

function exportJSON() {
  if (!verifications.length) { alert('ยังไม่มีข้อมูลให้ Export'); return; }
  const blob = new Blob([JSON.stringify(verifications, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  Object.assign(document.createElement('a'), { href: url, download: 'verifications.json' }).click();
  URL.revokeObjectURL(url);
}

/* ── Keyboard ───────────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (openSheet) { if (e.key === 'Escape') dismissSheet(); return; }
  if      (e.key === 'ArrowRight') doSwipe('right');
  else if (e.key === 'ArrowLeft')  doSwipe('left');
  else if (e.key === 'ArrowUp')    doSwipe('up');
});

/* ── Boot ───────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', init);
</script>
